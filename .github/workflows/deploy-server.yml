name: Deploy Game Manager

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            server/package-lock.json
            web/package-lock.json

      - name: Build server
        run: |
          cd server
          npm ci
          npm run build

      - name: Build web
        run: |
          cd web
          npm ci
          npm run build

      - name: Sync to VPS
        uses: burnett01/rsync-deployments@v8
        with:
          switches: -avzr --delete --exclude='.git' --exclude='node_modules' --exclude='data'
          path: ./
          remote_path: /opt/game-manager/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.DEPLOY_KEY }}

      - name: Restart service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/game-manager
            cd server && npm ci --omit=dev
            pm2 restart game-manager || pm2 start /opt/game-manager/server/dist/index.js \
              --name game-manager \
              --env production \
              --log /var/log/game-manager/pm2.log
            pm2 save
